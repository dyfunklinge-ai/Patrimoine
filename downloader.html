<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Téléchargeur via URL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0f1c;color:#e5e7eb;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{max-width:520px;width:100%;background:#111827;border:1px solid #1f2937;border-radius:14px;padding:24px}
h1{font-size:20px;margin-bottom:8px;color:#06b6d4}
.sub{color:#9ca3af;font-size:13px;margin-bottom:18px;line-height:1.5}
label{display:block;font-size:11px;color:#06b6d4;font-weight:600;margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:12px;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#e5e7eb;font-size:13px;font-family:inherit}
button{width:100%;padding:14px;background:linear-gradient(135deg,#06b6d4,#0891b2);color:#0a0f1c;border:0;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px}
button:disabled{opacity:0.4;cursor:not-allowed;background:#374151;color:#9ca3af}
#log{margin-top:14px;background:#0a0f1c;border:1px solid #1f2937;border-radius:8px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#9ca3af;line-height:1.6;min-height:50px}
.ok{color:#10b981}.err{color:#ef4444}.info{color:#06b6d4}.warn{color:#f59e0b}
</style>
</head><body>
<div class="box">
<h1>⬇ Téléchargeur URL</h1>
<div class="sub">Colle n'importe quel lien (Claude, GitHub raw, etc) et télécharge le contenu en un clic.</div>
<label>URL</label>
<input type="url" id="url" placeholder="https://..." autocomplete="off" autocapitalize="off" spellcheck="false">
<label>Nom du fichier</label>
<input type="text" id="name" value="index.html" autocomplete="off" autocapitalize="off" spellcheck="false">
<button id="go">Télécharger</button>
<div id="log">Prêt.</div>
</div>
<script>
const $=id=>document.getElementById(id);
const log=(m,c)=>{const s=document.createElement("div");if(c)s.className=c;s.textContent=m;$("log").appendChild(s)};
const PROXIES=[u=>u,u=>"https://corsproxy.io/?url="+encodeURIComponent(u),u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)];
const LABELS=["direct","corsproxy.io","allorigins.win"];
$("go").addEventListener("click",async()=>{
  const url=$("url").value.trim();
  const name=$("name").value.trim()||"download";
  if(!url){$("log").innerHTML="";log("✗ URL requise","err");return}
  $("go").disabled=true;
  $("log").innerHTML="";
  let blob=null;
  for(let i=0;i<PROXIES.length;i++){
    const u=PROXIES[i](url);
    log("Essai "+(i+1)+"/3 ("+LABELS[i]+")…","info");
    try{
      const r=await fetch(u,{cache:"no-store"});
      if(!r.ok){log("  HTTP "+r.status,"warn");continue}
      blob=await r.blob();
      log("  ✓ "+(blob.size/1024).toFixed(1)+" KB récupérés","ok");
      break;
    }catch(err){log("  ✗ "+err.message,"warn")}
  }
  if(!blob){log("✗ Toutes les méthodes ont échoué","err");$("go").disabled=false;return}
  const dlUrl=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=dlUrl;a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(dlUrl);a.remove()},200);
  log("⬇ Téléchargement déclenché : "+name,"ok");
  $("go").disabled=false;
});
</script>
</body></html>
