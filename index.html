<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ PATRIMOINE | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">◈ PATRIMOINE</h1>
            <p class="text-slate-400 mt-2">Suivi global et projections stratégiques</p>
        </div>
        <div class="glass-card p-6 rounded-2xl flex gap-10">
            <div>
                <p class="text-xs text-slate-400 uppercase tracking-wider">Total Patrimoine</p>
                <p id="totalNet" class="text-3xl font-bold text-white">0,00 €</p>
            </div>
            <div class="border-l border-slate-700 pl-6 text-emerald-400">
                <p class="text-xs text-slate-400 uppercase tracking-wider">Fond de Secours</p>
                <p id="emergencyTotal" class="text-2xl font-semibold">0 €</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-4 rounded-xl">
                    <h3 class="text-sm font-semibold mb-4 text-slate-300">Répartition des Actifs</h3>
                    <canvas id="repartitionChart"></canvas>
                </div>
                <div class="glass-card p-4 rounded-xl">
                    <h3 class="text-sm font-semibold mb-4 text-slate-300">Projection 10 ans</h3>
                    <canvas id="projectionChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card rounded-xl overflow-hidden">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="font-semibold">Positions Actives</h3>
                    <button class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm transition">Ajouter +</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-slate-400">
                            <tr>
                                <th class="p-4">Plateforme</th>
                                <th class="p-4">Investi</th>
                                <th class="p-4">Valeur Act.</th>
                                <th class="p-4">Performance</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 rounded-xl border-l-4 border-emerald-500">
                <h3 class="font-bold mb-4 flex items-center gap-2">🛡️ Fond de Secours</h3>
                <div class="space-y-4">
                    <input type="number" id="efInput" placeholder="Montant actuel" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white outline-none focus:border-emerald-500">
                    <p class="text-xs text-slate-500 italic">Objectif conseillé : 3 à 6 mois de dépenses.</p>
                    <button onclick="updateEmergency()" class="w-full bg-emerald-600 py-2 rounded font-semibold">Mettre à jour</button>
                </div>
            </div>

            <div class="glass-card p-6 rounded-xl">
                <h3 class="font-bold mb-4">⚙️ Gestion Rapide</h3>
                <div class="space-y-3">
                    <button class="w-full text-left p-3 rounded bg-slate-800 hover:bg-slate-700 transition">🧱 Immo (Bricks/PB)</button>
                    <button class="w-full text-left p-3 rounded bg-slate-800 hover:bg-slate-700 transition">📈 Bourse (IBKR)</button>
                    <button class="w-full text-left p-3 rounded bg-slate-800 hover:bg-slate-700 transition">🔶 Crypto (Binance/DeFi)</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Logique de calcul et graphiques (Simplifiée pour démonstration)
        function updateEmergency() {
            const val = document.getElementById('efInput').value;
            document.getElementById('emergencyTotal').innerText = val + " €";
            localStorage.setItem('fond_secours', val);
        }

        const ctx1 = document.getElementById('repartitionChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ['Immo', 'Bourse', 'Crypto', 'Secours'],
                datasets: [{
                    data: [40, 30, 20, 10],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#6366f1'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
        });

        const ctx2 = document.getElementById('projectionChart').getContext('2d');
        new Chart(ctx2, {
            type: 'line',
            data: {
                labels: ['An 1', 'An 3', 'An 5', 'An 10'],
                datasets: [{
                    label: 'Optimiste',
                    data: [10000, 35000, 70000, 150000],
                    borderColor: '#10b981',
                    tension: 0.4
                }]
            },
            options: { scales: { y: { grid: { color: '#334155' } } } }
        });
    </script>
</body>
</html>
